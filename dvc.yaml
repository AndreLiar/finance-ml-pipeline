stages:
  parse_statements:
    cmd: python src/pipeline/parse_statements.py
    deps:
      - src/pipeline/parse_statements.py
      - src/config.py
      - src/schemas.py
    outs:
      - data/transactions.xlsx
      - data/finance.db

  drift_check:
    cmd: python src/pipeline/drift_check.py
    deps:
      - src/pipeline/drift_check.py
      - src/config.py
      - data/finance.db
    outs:
      - data/drift_reports

  feature_engineering:
    cmd: python src/pipeline/feature_engineering.py
    deps:
      - src/pipeline/feature_engineering.py
      - src/config.py
      - src/schemas.py
      - data/transactions.xlsx
    outs:
      - data/features.xlsx

  train_models:
    cmd: python src/pipeline/train_models.py
    deps:
      - src/pipeline/train_models.py
      - src/config.py
      - data/features.xlsx
    outs:
      - data/model_results.xlsx
      - models/category_classifier.joblib
      - models/category_classifier_meta.json

  nlp_classifier:
    cmd: python src/pipeline/nlp_classifier.py
    deps:
      - src/pipeline/nlp_classifier.py
      - src/config.py
      - data/features.xlsx
    outs:
      - data/nlp_results.xlsx
      - models/nlp_classifier.joblib
      - models/nlp_classifier_meta.json

  creditworthiness:
    cmd: python src/pipeline/creditworthiness.py
    deps:
      - src/pipeline/creditworthiness.py
      - src/config.py
      - data/features.xlsx
    outs:
      - data/creditworthiness_results.xlsx
      - models/creditworthiness.joblib
      - models/creditworthiness_meta.json

  cashflow_forecast:
    cmd: python src/pipeline/cashflow_forecast.py
    deps:
      - src/pipeline/cashflow_forecast.py
      - src/config.py
      - data/creditworthiness_results.xlsx
      - data/features.xlsx
    outs:
      - data/cashflow_results.xlsx
      - models/cashflow_forecaster.joblib
      - models/cashflow_forecaster_meta.json

  anomaly_detection:
    cmd: python src/pipeline/anomaly_detection.py
    deps:
      - src/pipeline/anomaly_detection.py
      - src/config.py
      - data/features.xlsx
    outs:
      - data/anomaly_results.xlsx
      - models/anomaly_detection.joblib
      - models/anomaly_detection_meta.json
